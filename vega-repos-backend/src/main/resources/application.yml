server:
  port: 8086
  forward-headers-strategy: native

spring:
  application:
    name: vega-repos-backend
  datasource:
    url: ${VEGA_REPOS_DB_URL:jdbc:h2:file:./data/vega-repos;AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: ${VEGA_REPOS_DB_USER:vega}
    password: ${VEGA_REPOS_DB_PASSWORD:vega}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Vega User Service — login/profile proxy; JWT must match user-service jwt.secret.
# Dev users are seeded in user-service (com.vega.userservice.config.SeedUsers + DataInitializer).
vega:
  user-service:
    url: ${VEGA_USER_SERVICE_URL:http://localhost:8085}
    # Same signing secret as user-service jwt.secret (so Vega Repos can read JWT subject without calling user-service)
    jwt-secret: ${JWT_SECRET:rUv4rvWiB848GGv5+xXP/5tzQrgutI0/ZN6tLejDGU+8fnuBRU4cxckkxyvyMDHsobgM3fs086svyvMnkJAC5w==}
    login-path: /api/auth/login
  pull-service:
    url: ${VEGA_PULL_SERVICE_URL:http://localhost:8083}
  agent-service:
    url: ${VEGA_AGENT_SERVICE_URL:http://localhost:8084}
  # Monorepo layout: vega-system/vegadocs from cwd vega-repos/vega-repos-backend → ../../vegadocs
  docs:
    path: ${VEGA_DOCS_PATH:../../vegadocs}
  cli:
    jar-path: ${VEGA_CLI_JAR_PATH:}
    version: ${VEGA_CLI_VERSION:1.0.28}

# Hadoop HDFS configuration
hdfs:
  uri: ${HDFS_URI:hdfs://localhost:9000}
  base-path: /vega/repositories
  username: ${HDFS_USERNAME:root}

logging:
  level:
    com.vega: DEBUG
    org.springframework: INFO
