server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Repos backend
    location /api/ {
        proxy_pass http://vega-repos-backend:8086/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # AI agent service (must come before /api/ to take precedence)
    location /api/agent/ {
        proxy_pass http://vega-agent-service:8084/api/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 90s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
